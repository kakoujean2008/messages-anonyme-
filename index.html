<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Transform</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #1a1a1a, #333);
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    h1 {
      margin-top: 50px;
      font-size: 2em;
      color: #FFD700;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #FFD700;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      text-decoration: none;
      transition: transform 0.2s;
    }
    .btn:hover {
      transform: scale(1.1);
    }
    .examples {
      margin-top: 40px;
    }
    .examples img {
      width: 200px;
      margin: 10px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <h1>Transforme ta photo en style premium</h1>
  <a href="#" class="btn">Téléverser une photo</a>

  <div class="examples">
    <h2>Exemples</h2>
    <img src="https://via.placeholder.com/200x250.png?text=Exemple+1" alt="Exemple 1">
    <img src="https://via.placeholder.com/200x250.png?text=Exemple+2" alt="Exemple 2">
  </div>
</body>
</html>
