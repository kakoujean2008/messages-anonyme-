<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Transform Premium</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #1a1a1a, #333);
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    h1 {
      margin-top: 40px;
      font-size: 2em;
      color: #FFD700;
      font-weight: bold;
    }
    input[type="file"] {
      margin-top: 20px;
      padding: 12px;
      background: #FFD700;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: transform 0.2s;
    }
    input[type="file"]:hover {
      transform: scale(1.1);
    }
    .examples {
      margin-top: 40px;
    }
    .examples h2 {
      color: #FFD700;
    }
    .examples img {
      width: 200px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(255,215,0,0.6);
    }
  </style>
</head>
<body>
  <h1>Transforme ta photo en style premium</h1>
  <input type="file" accept="image/*">

  <div class="examples">
    <h2>Exemples</h2>
    <img src="https://via.placeholder.com/200x250.png?text=Exemple+1" alt="Exemple 1">
    <img src="https://via.placeholder.com/200x250.png?text=Exemple+2" alt="Exemple 2">
  </div>
<script src="script.js"></script>
</body>
</html>
